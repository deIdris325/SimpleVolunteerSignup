name: PHP CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint PHP files
        run: |
          php -l index.php
          php -l admin.php
          php -l helpers.php
          php -l save.php
          php -l remove.php
          php -l export.php
          php -l api.php
          php -l config.php
